apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yml
  - service.yml
  - pdb.yml

commonLabels:
  app.kubernetes.io/name: learneasyai
  app.kubernetes.io/managed-by: argocd
