# =============================================================================
# ANALYSIS TEMPLATES — Prometheus queries that gate canary promotion
# =============================================================================
# What is this?
#   AnalysisTemplate defines HOW to validate canary health.
#   At each canary step, Argo Rollouts runs these Prometheus queries.
#   If ANY metric fails → canary is aborted → traffic routes back to stable.
#
# Metrics checked:
#   1. Success rate (HTTP 5xx < 5%) — "Is the new version erroring?"
#   2. Latency P99 (< 500ms) — "Is the new version slow?"
#   3. Error rate comparison — "Is canary worse than stable?"
#
# How it connects:
#   Rollout step → triggers AnalysisRun → queries Prometheus → pass/fail
#   On failure: Rollout automatically sets weight back to 0% (rollback)
# =============================================================================

---
# =============================================================================
# PRIMARY ANALYSIS: Success Rate + Latency
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-success-rate
  namespace: project-prod
spec:
  args:
    - name: canary-service
    - name: stable-service
  metrics:
    # -----------------------------------------------------------------
    # METRIC 1: HTTP Success Rate (non-5xx responses)
    # -----------------------------------------------------------------
    # Query: "What percentage of requests to canary returned non-5xx?"
    # Threshold: must be > 95% (less than 5% errors)
    # If canary is returning errors → FAIL → rollback
    # -----------------------------------------------------------------
    - name: success-rate
      interval: 30s              # Check every 30 seconds
      count: 3                   # Run 3 measurements
      successCondition: result[0] >= 0.95    # 95%+ success rate required
      failureCondition: result[0] < 0.90     # Below 90% = immediate fail
      failureLimit: 1            # 1 failure = abort canary
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring:9090
          query: |
            sum(rate(
              nginx_ingress_controller_requests{
                service="{{args.canary-service}}",
                namespace="project-prod",
                status!~"5.."
              }[2m]
            )) /
            sum(rate(
              nginx_ingress_controller_requests{
                service="{{args.canary-service}}",
                namespace="project-prod"
              }[2m]
            ))

    # -----------------------------------------------------------------
    # METRIC 2: P99 Latency
    # -----------------------------------------------------------------
    # Query: "What is the 99th percentile response time for canary?"
    # Threshold: must be < 500ms (0.5 seconds)
    # If canary is slow → indicates a problem → FAIL → rollback
    # -----------------------------------------------------------------
    - name: latency-p99
      interval: 30s
      count: 3
      successCondition: result[0] < 0.5      # Under 500ms
      failureCondition: result[0] >= 1.0     # Over 1 second = immediate fail
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(
                nginx_ingress_controller_request_duration_seconds_bucket{
                  service="{{args.canary-service}}",
                  namespace="project-prod"
                }[2m]
              )) by (le)
            )

    # -----------------------------------------------------------------
    # METRIC 3: Error Rate Comparison (canary vs stable)
    # -----------------------------------------------------------------
    # Query: "Is canary error rate higher than stable?"
    # This catches regressions — even if error rate is low absolute,
    # if it's HIGHER than stable, something is wrong.
    # Threshold: canary error rate must not be 2x stable's error rate
    # -----------------------------------------------------------------
    - name: error-rate-vs-stable
      interval: 30s
      count: 3
      successCondition: result[0] <= 2.0     # Canary errors ≤ 2x stable errors
      failureCondition: result[0] > 5.0      # 5x worse = immediate fail
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring:9090
          query: |
            (
              sum(rate(
                nginx_ingress_controller_requests{
                  service="{{args.canary-service}}",
                  namespace="project-prod",
                  status=~"5.."
                }[2m]
              )) /
              sum(rate(
                nginx_ingress_controller_requests{
                  service="{{args.canary-service}}",
                  namespace="project-prod"
                }[2m]
              ))
            ) / (
              sum(rate(
                nginx_ingress_controller_requests{
                  service="{{args.stable-service}}",
                  namespace="project-prod",
                  status=~"5.."
                }[2m]
              )) /
              sum(rate(
                nginx_ingress_controller_requests{
                  service="{{args.stable-service}}",
                  namespace="project-prod"
                }[2m]
              ))
            )

---
# =============================================================================
# CANARY SERVICE — Routes traffic to canary pods only
# =============================================================================
# Argo Rollouts manages which pods back this Service (canary ReplicaSet only)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: learneasyai-canary
  namespace: project-prod
  labels:
    app: learneasya-ai
    role: canary
spec:
  ports:
  - name: http
    port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app: learneasya-ai
    # Argo Rollouts injects a rollouts-pod-template-hash label
    # to route traffic to canary pods only
  type: ClusterIP
